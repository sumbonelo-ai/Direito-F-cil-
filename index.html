<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Direito Fácil Angola</title>
    <!-- Preconnect and DNS prefetch for Google Fonts to prevent styling fallback delays on mobile devices -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <!-- Dynamic JS feature detection for flexbox gap support in older Android WebViews / Chrome -->
    <script>
      (function() {
        try {
          var flex = document.createElement("div");
          flex.style.display = "flex";
          flex.style.flexDirection = "column";
          flex.style.rowGap = "1px";
          flex.appendChild(document.createElement("div"));
          flex.appendChild(document.createElement("div"));
          document.documentElement.appendChild(flex);
          var isSupported = flex.scrollHeight === 1;
          flex.parentNode.removeChild(flex);
          if (!isSupported) {
            document.documentElement.classList.add("no-flex-gap");
          }
        } catch (e) {
          document.documentElement.classList.add("no-flex-gap");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
